[wheel]
universal = 1

[pydocstyle]
ignore = D400,D203,D212,D107,D205,D202,D213

[pylint]
max-line-length = 120
# C0330 wrong hanging indentation - disagrees with black and I agree with black
# C0415 import outside toplevel - often this is done for performance reasons
disable = C0330,C0415

[mypy]
disallow_untyped_defs = False
warn_return_any = True
warn_unused_configs = True
disallow_any_unimported = True
disallow_any_generics = True

[mypy-appdirs]
ignore_missing_imports = True

[mypy-docopt]
ignore_missing_imports = True

[mypy-aiohttp]
ignore_missing_imports = True
