---
name: Test

on: push

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v2

      - name: Install Node.js dependencies
        run: npm ci

      - name: Start services
        run: docker-compose up -d

      - name: Wait for API to accept requests
        run: node ./scripts/healthcheck.js
        env:
          TASKFORGE_HOST: http://api/api

      - name: Run tests
        run: npm test
        env:
          TASKFORGE_HOST: http://api/api
