---
name: Run tests

jobs:
  tests:
    - uses: actions/checkout@v2
    - name: Set Up Python
      users: actions/setup-python@v1
      with:
        python-version: 3.8
    - name: Install make
      run: sudo apt install -y -qq make
    - name: Install dev tooling
      run: make install-dev
    - name: Run tests
      run: make test-all

  type-check:
    - uses: actions/checkout@v2
    - name: Set Up Python
      users: actions/setup-python@v1
      with:
        python-version: 3.8
    - name: Install make
      run: sudo apt install -y -qq make
    - name: Install dev tooling
      run: make install-dev
    - name: Run tests
      run: make mypy
