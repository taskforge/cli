---
name: Run tests
on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Set Up Python
        uses: actions/setup-python@v1
        with:
          python-version: 3.8
      - name: Install make
        run: sudo apt install -y -qq make
      - name: Install dev tooling
        run: make install-dev
      - name: Run tests
        run: make test-all

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Set Up Python
        uses: actions/setup-python@v1
        with:
          python-version: 3.8
      - name: Install make
        run: sudo apt install -y -qq make
      - name: Install dev tooling
        run: make install-dev
      - name: Run tests
        run: make mypy
