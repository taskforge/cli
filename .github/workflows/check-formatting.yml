---
name: Check Code Style
on: [push]
runs-on: ubuntu-latest

jobs:
  lint:
    name: Pylint
    steps:
      - uses: actions/checkout@v2
      - name: Set Up Python
        uses: actions/setup-python@v1
        with:
          python-version: 3.8
      - name: Install dev tooling
        run: python -m pip install -r requirements/dev.txt
      - name: Install make
        run: sudo apt install -y -qq make
      - name: Run pylint
        run: make pylint

  black:
    name: Black
    steps:
      - uses: actions/checkout@v2
      - name: Set Up Python
        uses: actions/setup-python@v1
        with:
          python-version: 3.8
      - name: Install dev tooling
        run: python -m pip install -r requirements/dev.txt
      - name: Install make
        run: sudo apt install -y -qq make
      - name: Check Black Formatting
        run: make black-check 

  pydocstyle:
    name: Pydocstyle
    steps:
      - uses: actions/checkout@v2
      - name: Set Up Python
        uses: actions/setup-python@v1
        with:
          python-version: 3.8
      - name: Install dev tooling
        run: python -m pip install -r requirements/dev.txt
      - name: Install make
        run: sudo apt install -y -qq make
      - name: Check Pydocstyle
        run: make pydocstyle 

