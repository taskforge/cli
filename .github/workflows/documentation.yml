---

name: Documentation validation
on: [push]

jobs:
  vale:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - uses: actions/checkout@v2
      - name: Install vale
        run: |
          apt-get update -qq && apt-get install -y -qq python python-docutils curl
          curl -sfL https://install.goreleaser.com/github.com/ValeLint/vale.sh | sh
      - name: Check docs
        run: ./bin/vale --ext='.rst' --glob='*.rst' docs

  check-documentation-for-broken-links:
    runs-on: ubuntu-latest
    container:
      image: nginx:latest
    steps:
      - uses: actions/checkout@v2
      - name: Build docs
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-docutils python3-pip python3-sphinx make git
          pip3 install deadlinks
          make PYTHON=$(which python3) website
          cp -R build/website/public/* /usr/share/nginx/html/
      - name: Validate links
        run: |
          nginx 2>/dev/null 1>/dev/null &
          deadlinks http://localhost:80
          killall nginx

